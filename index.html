<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatchWise - Learn Smarter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
  <link rel="icon" type="image/png" href="/favicon.png?v=1">
  <link rel="apple-touch-icon" href="/favicon.png?v=1">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #da0b0b;
      --secondary: #7FFFD4;
      --background-dark: #000000;
      
      --apple-bg: #000000;
      --apple-card-bg: rgba(10, 10, 10, 0.7);
      --apple-sidebar-bg: rgba(0, 0, 0, 0.5);
      --apple-header-bg: rgba(0, 0, 0, 0.6);
      --apple-text: #ffffff;
      --apple-text-secondary: #94a3b8;
      --apple-border: rgba(255, 255, 255, 0.08);
      --system-blue: #ff2d55;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
    }

    /* Flat Quasaar/Astra Cards */
    .apple-card {
      background: var(--apple-card-bg);
      border: 1px solid var(--apple-border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s ease;
    }

    .apple-card:hover {
      border-color: var(--primary);
      background: var(--apple-card-bg);
    }

    /* Solid Header (No Glassmorphism) */
    .apple-glass {
      background: var(--apple-bg);
      border-bottom: 1px solid var(--apple-border);
      z-index: 1000;
      position: sticky;
      top: 0;
    }

    /* Refined Buttons */
    .apple-button-primary {
      background: var(--primary) !important;
      color: #FFFFFF !important;
      border-radius: 6px !important;
      padding: 10px 24px !important;
      font-weight: 600 !important;
      transition: all 0.2s ease !important;
      border: none !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
    }

    .apple-button-primary:hover {
      filter: brightness(1.1) !important;
      box-shadow: 0 4px 12px rgba(218, 11, 11, 0.2) !important;
    }

    .apple-button-primary:active {
      transform: translateY(1px) !important;
    }

    .apple-button-secondary {
      background: transparent !important;
      color: var(--apple-text) !important;
      border: 1px solid var(--apple-border) !important;
      border-radius: 6px !important;
      padding: 10px 24px !important;
      font-weight: 600 !important;
      transition: all 0.2s ease !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
    }

    .dark .apple-button-secondary {
      background: #18181b !important;
      border-color: #27272a !important;
      color: #f4f4f5 !important;
    }

    .apple-button-secondary:hover {
      background: #f4f4f5 !important;
      border-color: var(--primary) !important;
    }

    .dark .apple-button-secondary:hover {
      background: #27272a !important;
    }

    /* Standard Apple Input */
    .apple-input {
      background: rgba(142, 142, 147, 0.1) !important;
      border: 1px solid transparent !important;
      border-radius: 10px !important;
      padding: 10px 16px !important;
      color: var(--apple-text) !important;
      font-weight: 500 !important;
      transition: all 0.3s ease !important;
      width: 100% !important;
      outline: none !important;
    }

    .dark .apple-input {
      background: rgba(255, 255, 255, 0.05) !important;
    }

    .apple-input:focus {
      background: var(--apple-card-bg) !important;
      border-color: var(--system-blue) !important;
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1) !important;
    }

    /* System Badges */
    .apple-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 12px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: saturate(1.5);
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Apple-style Range Input */
    .apple-range {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(142, 142, 147, 0.2);
      border-radius: 9999px;
      outline: none;
      transition: all 0.2s ease;
    }

    .dark .apple-range {
      background: rgba(255, 255, 255, 0.15);
    }

    .apple-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #FFFFFF;
      border: 0.5px solid rgba(0, 0, 0, 0.04);
      border-radius: 50%;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12), 0 3px 1px rgba(0, 0, 0, 0.04);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .apple-range::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.16), 0 3px 1px rgba(0, 0, 0, 0.04);
    }

    .apple-range::-webkit-slider-thumb:active {
      transform: scale(0.95);
      background: #F2F2F7;
    }

    /* Animations */
    @keyframes apple-in {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    .animate-apple {
      animation: apple-in 0.8s cubic-bezier(0.15, 0, 0.15, 1) forwards;
    }

    /* Apple-style Loading Spinner */
    .apple-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(0, 122, 255, 0.1);
      border-top-color: var(--system-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Shimmer Effect */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .animate-shimmer {
      background: linear-gradient(90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.12) 50%,
          rgba(255, 255, 255, 0) 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s infinite linear;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 8s linear infinite;
    }

    /* Cards */
    .kinetic-portal {
      position: relative;
      background: var(--apple-card-bg);
      border: 1px solid var(--apple-border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }
    .kinetic-portal:hover {
      border-color: rgba(255,255,255,0.12);
    }

    /* Glass Card Style */
    .glass-card {
      background: var(--apple-card-bg);
      border: 1px solid var(--apple-border);
      transition: border-color 0.2s ease;
    }
    .glass-card:hover {
      border-color: rgba(255,255,255,0.12);
    }
  </style>
