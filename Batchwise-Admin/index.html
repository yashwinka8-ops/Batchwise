<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BatchWise - Admin Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
  <link rel="icon" type="image/png" href="/favicon.png?v=1">
  <link rel="apple-touch-icon" href="/favicon.png?v=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #da0b0b;
      --secondary: #7FFFD4;
      --background-light: #ffffff;
      --background-dark: #000000;
      
      /* Slate Custom Palette */
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --slate-950: #020617;

      --apple-bg: var(--background-dark); /* Default to dark for admin */
      --apple-card-bg: #09090b;
      --apple-text: #f4f4f5;
      --apple-text-secondary: #a1a1aa;
      --apple-border: #27272a;
      --system-blue: var(--primary);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--apple-bg);
      color: var(--apple-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
    }

    .apple-card {
      background: var(--apple-card-bg);
      border: 1px solid var(--apple-border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s ease;
    }

    .apple-button-primary {
      background: var(--primary) !important;
      color: #FFFFFF !important;
      border-radius: 6px !important;
      padding: 10px 24px !important;
      font-weight: 600 !important;
      transition: all 0.2s ease !important;
      border: none !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
    }

    .apple-input {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid transparent !important;
      border-radius: 10px !important;
      padding: 10px 16px !important;
      color: var(--apple-text) !important;
      font-weight: 500 !important;
      transition: all 0.3s ease !important;
      width: 100% !important;
      outline: none !important;
    }

    .apple-input:focus {
      background: var(--apple-card-bg) !important;
      border-color: var(--system-blue) !important;
      box-shadow: 0 0 0 4px rgba(218, 11, 11, 0.1) !important;
    }

    @keyframes apple-in {
      0% {
        opacity: 0;
        transform: scale(0.985) translateY(12px);
        filter: blur(8px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    .animate-apple {
      animation: apple-in 0.8s cubic-bezier(0.15, 0, 0.15, 1) forwards;
    }

    .apple-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(218, 11, 11, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
  </style>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      chtml: { fontURL: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/output/chtml/fonts/woff-v2' }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
